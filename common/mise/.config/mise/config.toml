# mise (formerly rtx) global configuration
# https://mise.jdx.dev/

[settings]
experimental = true
always_keep_download = false
always_keep_install = false
legacy_version_file = true
legacy_version_file_disable_tools = []
jobs = 4
raw = false
yes = false
verbose = false
quiet = false
asdf_compat = false
disable_default_shorthands = false
disable_tools = []
trusted_config_paths = ["~/Projects", "~/work", "~/dev"]
paranoid = false

# ⬇️ NEW: correct cache setting
cache_prune_age = "24h"

[tools]
node = "lts"
python = ["3.11", "3.12"]
go = "latest"
rust = "stable"
ruby = "3.2"
java = "21"
terraform = "latest"
kubectl = "latest"
helm = "latest"
aws-cli = "latest"
gcloud = "latest"
azure-cli = "latest"
github-cli = "latest"
jq = "latest"
yq = "latest"
direnv = "latest"

[alias.node.versions]
lts = "20"
latest = "21"

[alias.python.versions]
latest = "3.12"
system = "/usr/bin/python3"

[env]
NODE_ENV = "development"
NPM_CONFIG_PREFIX = "~/.npm-global"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"
GO111MODULE = "on"
GOPATH = "$HOME/go"
CARGO_HOME = "$HOME/.cargo"
RUSTUP_HOME = "$HOME/.rustup"
EDITOR = "nvim"
VISUAL = "nvim"

[plugins]
# Custom plugin URLs (if not in default repository)
# example = "https://github.com/user/asdf-example.git"

[tasks]
# Define custom tasks
# https://mise.jdx.dev/tasks.html

[tasks.update]
description = "Update all tools to latest versions"
run = "mise upgrade"

[tasks.clean]
description = "Clean mise cache and unused versions"
run = ["mise cache clear", "mise prune --yes"]

[tasks.doctor]
description = "Check mise installation and configuration"
run = "mise doctor"

[tasks.install-globals]
description = "Install global npm/pip packages"
run = [
  "npm install -g pnpm yarn npm-check-updates",
  "pip install --upgrade pip setuptools wheel pipx"
]

[hooks.enter]
# run in current shell
shell = "bash"
script = """
if [ -f .venv/bin/activate ]; then
  source .venv/bin/activate
fi
"""

# (Optional) mirror for zsh; you can keep just one if you like
[hooks.enter.zsh]
shell = "zsh"
script = """
if [ -f .venv/bin/activate ]; then
  source .venv/bin/activate
fi
""""