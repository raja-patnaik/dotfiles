add_newline = true
command_timeout = 200

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[character]
error_symbol = "[✗](bold red)"
success_symbol = "[❯](bold mauve)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
repo_root_style = "bold mauve"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
style = "bold lavender"

[git_branch]
format = "[$branch]($style) "
style = "italic mauve"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "lavender"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇡${ahead_count}⇣${behind_count} "
conflicted = "=${count} "
untracked = "?${count} "
modified = "!${count} "
staged = "+${count} "
deleted = "✘${count} "
stashed = "*${count} "
renamed = "»${count} "

[cmd_duration]
min_time = 3_000
format = "[$duration]($style) "
style = "yellow"

[python]
format = '[py $version]($style) '
style = "blue"

[nodejs]
format = '[node $version]($style) '
style = "green"

[rust]
format = '[rs $version]($style) '
style = "red"

[golang]
format = '[go $version]($style) '
style = "sapphire"
