add_newline = true
command_timeout = 500
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[character]
error_symbol = "[✗](bold red)"
success_symbol = "[❯](bold mauve)"

[directory]
truncation_length = 4
truncation_symbol = "…/"
repo_root_style = "bold mauve"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
style = "bold lavender"

[git_branch]
format = "[$branch]($style) "
style = "italic mauve"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "lavender"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇡${ahead_count}⇣${behind_count} "
conflicted = "=${count} "
untracked = "?${count} "
modified = "!${count} "
staged = "+${count} "
deleted = "✘${count} "
stashed = "*${count} "
renamed = "»${count} "

[cmd_duration]
min_time = 3_000
format = "[$duration]($style) "
style = "yellow"

[python]
format = '[py $version]($style) '
style = "blue"

[nodejs]
format = '[node $version]($style) '
style = "green"

[rust]
format = '[rs $version]($style) '
style = "red"

[golang]
format = '[go $version]($style) '
style = "sapphire"

[docker_context]
format = '[docker $context]($style) '
style = "blue"
only_with_files = true

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
