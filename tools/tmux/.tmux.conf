# ~/.tmux.conf - Tmux configuration
# Modern tmux configuration with sensible defaults

# ============================================================================
# General Settings
# ============================================================================

# Use 256 colors and true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Set prefix to Ctrl-a (like GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Set scrollback buffer size
set -g history-limit 50000

# Display times
set -g display-time 4000
set -g display-panes-time 1000

# Status refresh interval
set -g status-interval 5

# Focus events (for vim autoread)
set -g focus-events on

# Aggressive resize
setw -g aggressive-resize on

# No delay for escape key
set -sg escape-time 0

# Allow OSC52 to pass through to the terminal (enables clipboard over SSH/tmux)
set -g allow-passthrough on
set -g set-clipboard on

# Set window notifications
setw -g monitor-activity on
set -g visual-activity off

# Set terminal title
set -g set-titles on
set -g set-titles-string '#S • #W'

# ============================================================================
# Key Bindings
# ============================================================================

# Reload configuration
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window in current directory
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim-like bindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navigate panes with Alt+Arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Navigate windows
bind -r C-h previous-window
bind -r C-l next-window
bind -n S-Left previous-window
bind -n S-Right next-window

# Swap windows
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Toggle pane synchronization
bind S setw synchronize-panes \; display-message "Synchronize panes: #{?pane_synchronized,on,off}"

# Kill pane/window/session
bind x kill-pane
bind X kill-window
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Copy mode with vim bindings
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Copy to system clipboard (OSC52 handles SSH/tmux/WSL via set-clipboard on)
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Paste from clipboard
bind p paste-buffer
bind P choose-buffer

# Toggle status bar
bind b set -g status

# Session management
bind N new-session
bind f command-prompt -p find-session 'switch-client -t %%'

# Layout shortcuts
bind M-1 select-layout main-horizontal
bind M-2 select-layout main-vertical
bind M-3 select-layout even-horizontal
bind M-4 select-layout even-vertical
bind M-5 select-layout tiled
bind Space next-layout

# ============================================================================
# Status Bar
# ============================================================================

# Status bar position
set -g status-position bottom

# Status bar style
set -g status-style 'bg=#1e2030 fg=#82aaff'

# Left side of status bar
set -g status-left-length 40
set -g status-left '#[fg=#1e2030,bg=#82aaff,bold]  #S #[fg=#82aaff,bg=#3b4261,nobold]#[fg=#82aaff,bg=#3b4261] #(whoami) #[fg=#3b4261,bg=#1e2030,nobold]'

# Right side of status bar
set -g status-right-length 60
set -g status-right '#[fg=#3b4261,bg=#1e2030,nobold]#[fg=#82aaff,bg=#3b4261]  %H:%M #[fg=#82aaff,bg=#3b4261]#[fg=#1e2030,bg=#82aaff,bold]  %d-%b-%y '

# Window status
set -g window-status-format '#[fg=#1e2030,bg=#3b4261,nobold]#[fg=#82aaff,bg=#3b4261] #I:#W#F #[fg=#3b4261,bg=#1e2030,nobold]'
set -g window-status-current-format '#[fg=#1e2030,bg=#82aaff,nobold]#[fg=#1e2030,bg=#82aaff,bold] #I:#W#F #[fg=#82aaff,bg=#1e2030,nobold]'

# Window status alignment
set -g status-justify centre

# Message styling
set -g message-style 'fg=#82aaff bg=#1e2030 bold'

# ============================================================================
# Pane Borders
# ============================================================================

# Pane border style
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#82aaff'

# Display pane numbers
set -g display-panes-active-colour '#82aaff'
set -g display-panes-colour '#3b4261'

# ============================================================================
# Plugins (using TPM - Tmux Plugin Manager)
# ============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Plugin configurations
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '10'

# Prefix highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e2030,bg=#f7768e,bold'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'

# Add prefix highlight to status bar
set -g status-right '#{prefix_highlight} #[fg=#3b4261,bg=#1e2030,nobold]#[fg=#82aaff,bg=#3b4261]  %H:%M #[fg=#82aaff,bg=#3b4261]#[fg=#1e2030,bg=#82aaff,bold]  %d-%b-%y '

# ============================================================================
# Local Configuration
# ============================================================================

# Source local config if exists
if-shell "test -f ~/.tmux.conf.local" "source ~/.tmux.conf.local"

# ============================================================================
# Initialize TPM (keep at bottom of file)
# ============================================================================

# Auto-install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'