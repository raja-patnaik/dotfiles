# ~/.tmux.conf - Tmux configuration
#
# Prefix is Ctrl+A (like GNU Screen).
#
# Helper scripts:
#   shell/zsh/.zshrc - shell functions (tm, tp, tv, tn, tms, tw, twd)

# ============================================================================
# General Settings
# ============================================================================

# Terminal & true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Prefix: Ctrl+A (like GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix  # press prefix twice to send literal Ctrl+A

# Core behavior
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -sg escape-time 0        # no delay after Escape (critical for neovim)
set -g focus-events on        # for vim autoread
setw -g aggressive-resize on
setw -g mode-keys vi          # vim keybindings in copy mode

# Don't auto-rename windows — names come from session scripts
setw -g automatic-rename off
set -g allow-rename off

# Display
set -g display-time 4000
set -g display-panes-time 1000
set -g status-interval 5

# Window notifications
setw -g monitor-activity on
set -g visual-activity off

# Terminal title
set -g set-titles on
set -g set-titles-string '#S • #W'

# ============================================================================
# Key Bindings
# ============================================================================

# --- Config reload ---
unbind r
bind g source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Pane navigation (vim-style with prefix) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resizing (vim-style, repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Pane splitting (open in same directory) ---
bind d split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane management ---
bind z resize-pane -Z   # zoom/fullscreen toggle
bind x kill-pane         # close pane without confirmation
bind i join-pane -s !    # pull last pane into this window
bind - detach            # quick detach

# --- Create new window in current directory ---
bind c new-window -c "#{pane_current_path}"

# --- Window navigation: Alt+1..9 (no prefix needed) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Clear screen (Alt+k) ---
# If a program (not a shell) is running: send Ctrl+L so we don't blow it away
# If at a plain shell prompt: clear screen AND scrollback (like Cmd+K)
is_program="ps -o comm= -t '#{pane_tty}' | grep -vE '^-?(fish|bash|zsh|sh|ps|grep|awk|sed|cut|sort|uniq|head|cat|echo|printf)$' | grep -q ."
bind -n M-k if-shell "$is_program" "send-keys C-l" "send-keys -R; clear-history"

# --- Edit scrollback in neovim ---
bind e run-shell "tmux capture-pane -pS - > /tmp/tmux-scrollback-$$.txt && tmux new-window -n 'scrollback' 'nvim /tmp/tmux-scrollback-$$.txt; rm -f /tmp/tmux-scrollback-$$.txt'"

# --- Swap windows ---
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# --- Session management ---
bind N new-session
bind f command-prompt -p find-session 'switch-client -t %%'

# --- Layout shortcuts ---
bind Space next-layout

# ============================================================================
# Copy Mode
# ============================================================================

# Enter copy mode
bind Enter copy-mode

# vim-style selection and copy
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Don't exit copy mode after mouse drag
unbind -T copy-mode-vi MouseDragEnd1Pane

# Clipboard integration (OSC 52 passthrough for SSH)
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features ',xterm*:clipboard'

# Platform-specific clipboard
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "uname | grep -q Linux" {
  if-shell "uname -r | grep -q microsoft" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
  }
}

# Paste
bind p paste-buffer
bind P choose-buffer

# ============================================================================
# Status Bar
# ============================================================================

set -g status-position bottom
set -g status-style 'bg=#1e2030 fg=#82aaff'

# Left: session name + user
set -g status-left-length 40
set -g status-left '#[fg=#1e2030,bg=#82aaff,bold]  #S #[fg=#82aaff,bg=#3b4261,nobold]#[fg=#82aaff,bg=#3b4261] #(whoami) #[fg=#3b4261,bg=#1e2030,nobold]'

# Right: prefix highlight + time + date
set -g status-right-length 60
set -g status-right '#{prefix_highlight} #[fg=#3b4261,bg=#1e2030,nobold]#[fg=#82aaff,bg=#3b4261]  %H:%M #[fg=#82aaff,bg=#3b4261]#[fg=#1e2030,bg=#82aaff,bold]  %d-%b-%y '

# Window tabs
set -g window-status-format '#[fg=#1e2030,bg=#3b4261,nobold]#[fg=#82aaff,bg=#3b4261] #I:#W#F #[fg=#3b4261,bg=#1e2030,nobold]'
set -g window-status-current-format '#[fg=#1e2030,bg=#82aaff,nobold]#[fg=#1e2030,bg=#82aaff,bold] #I:#W#F #[fg=#82aaff,bg=#1e2030,nobold]'
set -g status-justify centre

# Messages
set -g message-style 'fg=#82aaff bg=#1e2030 bold'

# ============================================================================
# Pane Borders
# ============================================================================

set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#82aaff'
set -g display-panes-active-colour '#82aaff'
set -g display-panes-colour '#3b4261'

# ============================================================================
# Plugins (TPM)
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'wfxr/tmux-fzf-url'

# Resurrect & Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '15'
# set -g @continuum-restore 'on'  # uncomment to auto-restore on start

# SessionX: fuzzy session switcher
set -g @sessionx-bind 'o'

# Fuzzback: fzf search through scrollback
set -g @fuzzback-popup 1
set -g @fuzzback-hide-preview 1
set -g @fuzzback-popup-size '60%'

# Prefix highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e2030,bg=#f7768e,bold'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'

# ============================================================================
# Local Configuration
# ============================================================================

# Source local config if exists
if-shell "test -f ~/.tmux.conf.local" "source ~/.tmux.conf.local"

# ============================================================================
# Initialize TPM (must be last)
# ============================================================================

# Auto-install TPM if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
