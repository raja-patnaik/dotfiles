# Atuin configuration - shell history sync
# https://docs.atuin.sh/

## Server configuration (optional - for self-hosting)
# sync_address = "https://api.atuin.sh"
# sync_frequency = "10m"

## Sync configuration
auto_sync = true
sync_frequency = "1h"
update_check = true

## Search configuration
search_mode = "fuzzy"           # Options: prefix, fulltext, fuzzy, skim
filter_mode = "global"          # Options: global, host, session, directory
filter_mode_shell_up_key = "session"  # Filter mode for up arrow key
inline_height = 0               # Height of inline search (0 = adaptive)
show_preview = true            # Show command preview
max_preview_height = 4         # Maximum preview height

## Display configuration
style = "compact"              # Options: auto, full, compact
show_help = true              # Show help banner
show_tabs = true              # Show tab indicators
invert = false                # Invert colors

## Exit behavior
exit_mode = "return-original" # Options: return-original, return-query

## History settings
history_filter = [
  # Don't save commands starting with a space
  "^\\s",
  # Don't save exit commands
  "^exit$",
  # Don't save clear commands
  "^clear$",
  # Don't save single character commands
  "^.$",
  # Don't save commands with secrets
  "api_key",
  "api_secret",
  "password",
  "token",
  "secret",
]

## Import settings
# Import from existing shell history on first run
import_from_shell_history = true

## Key bindings
# Customize key bindings for search interface
# See: https://docs.atuin.sh/configuration/key-binding/

## Database settings
db_path = "~/.local/share/atuin/history.db"

## Secrets filtering
secrets_filter = true         # Enable automatic secrets filtering
secrets_regex = [
  # AWS
  "AWS_[A-Z_]+=[A-Za-z0-9+/=]+",
  "aws_[a-z_]+=[A-Za-z0-9+/=]+",

  # Generic API keys
  "api[_-]?key[_-]?[=:][A-Za-z0-9+/=]+",
  "API[_-]?KEY[_-]?[=:][A-Za-z0-9+/=]+",

  # Tokens
  "[Tt]oken[=:][A-Za-z0-9+/=]+",
  "[Bb]earer [A-Za-z0-9+/=]+",

  # Passwords
  "[Pp]assword[=:].+",
  "[Pp]ass[=:].+",
  "[Pp]wd[=:].+",

  # Database URLs
  "postgres://[^@]+@",
  "mysql://[^@]+@",
  "mongodb://[^@]+@",

  # SSH keys
  "-----BEGIN [A-Z ]+-----",
]

## Statistics
show_statistics = true        # Show statistics in search

## Common subcommands
# Configure how subcommands are handled
common_subcommands = [
  "cargo",
  "composer",
  "docker",
  "git",
  "go",
  "kubectl",
  "npm",
  "pnpm",
  "poetry",
  "yarn",
]

## Ignored commands
# These commands won't be saved to history
ignored_commands = [
  "ls",
  "cd",
  "pwd",
  "exit",
  "clear",
  "history",
]

## Network timeout
network_timeout = 30           # Seconds

## Timezone
# timezone = "UTC"             # Use system timezone by default

## Word jump mode
word_jump_mode = "emacs"      # Options: emacs, subl

## Cursor position
enter_accept = true           # Accept on enter key

## History format
history_format = "{time} ¦ {duration} ¦ {command}"

## Workspaces
# workspace = false            # Enable workspace filtering