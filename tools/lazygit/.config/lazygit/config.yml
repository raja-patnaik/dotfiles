# LazyGit configuration
gui:
  # Theme
  theme:
    activeBorderColor:
      - "#82aaff"
      - bold
    inactiveBorderColor:
      - "#565f89"
    selectedLineBgColor:
      - "#3b4261"
    selectedRangeBgColor:
      - "#3b4261"
    cherryPickedCommitBgColor:
      - "#82aaff"
    cherryPickedCommitFgColor:
      - "#1e2030"
    markedBaseCommitFgColor:
      - "#82aaff"
    markedBaseCommitBgColor:
      - "#ffc777"
    unstagedChangesColor:
      - "#ff757f"

  # Layout
  scrollHeight: 10
  scrollPastBottom: true
  sidePanelWidth: 0.3333
  expandFocusedSidePanel: false
  mainPanelSplitMode: "flexible"
  language: "en"
  timeFormat: "02 Jan 06 15:04 MST"
  shortTimeFormat: "15:04"
  showFileTree: true
  showListFooter: true
  showRandomTip: false
  showBottomLine: true
  showPanelJumps: true
  showCommandLog: true
  showIcons: true
  nerdFontsVersion: "3"

  # Command log
  commandLogSize: 8
  splitDiff: "auto"

  # Commit message
  commitLength:
    show: true

  # Mouse support
  mouseEvents: true

  # Skip discard changes warning
  skipDiscardChangeWarning: false
  skipStashWarning: false
  showBranchCommitHash: false

  # Border
  border: "rounded"

  # Filter mode
  filterMode: "fuzzy"

git:
  # Paging
  paging:
    colorArg: always
    pager: delta --dark --paging=never

  # Commit
  commit:
    signOff: false
    verbose: default

  # Merging
  merging:
    manualCommit: false
    args: ""

  # Pull
  pull:
    mode: "auto"

  # Skip hook
  skipHookPrefix: WIP

  # Auto-fetch
  autoFetch: true
  autoRefresh: true

  # Branch
  branchLogCmd: "git log --graph --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%cr) %C(bold blue)<%an>%Creset' {{branchName}} --"
  allBranchesLogCmd: "git log --graph --all --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%cr) %C(bold blue)<%an>%Creset'"

  # Overrides
  overrideGpg: false

  # Disable force pushing
  disableForcePushing: false

  # Parse emoji
  parseEmoji: true

  # Diff context size
  diffContextSize: 3

os:
  # Editor
  editPreset: "nvim"

  # Open command
  openCommand: ""

refresher:
  refreshInterval: 10
  fetchInterval: 60

update:
  method: prompt
  days: 14

reporting: "off"
confirmOnQuit: false
quitOnTopLevelReturn: false

# Disable intro popup
disableStartupPopup: true
notARepository: "prompt"

# Prompt to return from subprocess
promptToReturnFromSubprocess: true

keybinding:
  universal:
    quit: "q"
    quit-alt1: "<c-c>"
    return: "<esc>"
    quitWithoutChangingDirectory: "Q"
    togglePanel: "<tab>"
    prevItem: "<up>"
    nextItem: "<down>"
    prevItem-alt: "k"
    nextItem-alt: "j"
    prevPage: ","
    nextPage: "."
    scrollLeft: "H"
    scrollRight: "L"
    gotoTop: "<"
    gotoBottom: ">"
    toggleRangeSelect: "v"
    rangeSelectDown: "<s-down>"
    rangeSelectUp: "<s-up>"
    prevBlock: "<left>"
    nextBlock: "<right>"
    prevBlock-alt: "h"
    nextBlock-alt: "l"
    nextBlock-alt2: "<tab>"
    prevBlock-alt2: "<s-tab>"
    jumpToBlock: ["1", "2", "3", "4", "5"]
    nextMatch: "n"
    prevMatch: "N"
    startSearch: "/"
    optionMenu: null
    optionMenu-alt1: "?"
    select: "<space>"
    goInto: "<enter>"
    openRecentRepos: "<c-r>"
    confirm: "<enter>"
    remove: "d"
    new: "n"
    edit: "e"
    openFile: "o"
    scrollUpMain: "<pgup>"
    scrollDownMain: "<pgdown>"
    scrollUpMain-alt1: "K"
    scrollDownMain-alt1: "J"
    scrollUpMain-alt2: "<c-u>"
    scrollDownMain-alt2: "<c-d>"
    executeCustomCommand: ":"
    createRebaseOptionsMenu: "m"

    # Diff view
    diffScreenMode: "M"
    toggleWhitespaceInDiffView: "<c-w>"
    increaseContextInDiffView: "}"
    decreaseContextInDiffView: "{"

  status:
    checkForUpdate: "u"
    recentRepos: "<enter>"

  files:
    commitChanges: "c"
    commitChangesWithoutHook: "w"
    amendLastCommit: "A"
    commitChangesWithEditor: "C"
    findBaseCommitForFixup: "<c-f>"
    confirmDiscard: "x"
    ignoreFile: "i"
    refreshFiles: "r"
    stashAllChanges: "s"
    viewStashOptions: "S"
    toggleStagedAll: "a"
    viewResetOptions: "D"
    fetch: "f"
    toggleTreeView: "`"
    openMergeTool: "M"
    openStatusFilter: "<c-b>"
    copyFileInfoToClipboard: "y"

  branches:
    createPullRequest: "o"
    viewPullRequestOptions: "O"
    copyPullRequestURL: "<c-y>"
    checkoutBranchByName: "c"
    forceCheckoutBranch: "F"
    rebaseBranch: "r"
    renameBranch: "R"
    mergeIntoCurrentBranch: "M"
    viewGitFlowOptions: "i"
    fastForward: "f"
    createTag: "T"
    pushTag: "P"
    setUpstream: "u"
    fetchRemote: "f"
    sortOrder: "s"

  worktrees:
    viewWorktreeOptions: "w"

  commits:
    squashDown: "s"
    renameCommit: "r"
    renameCommitWithEditor: "R"
    viewResetOptions: "g"
    markCommitAsFixup: "f"
    createFixupCommit: "F"
    squashAboveCommits: "S"
    moveDownCommit: "<c-j>"
    moveUpCommit: "<c-k>"
    amendToCommit: "A"
    resetCommitAuthor: "a"
    pickCommit: "p"
    revertCommit: "t"
    cherryPickCopy: "c"
    pasteCommits: "v"
    markCommitAsBaseForRebase: "B"
    tagCommit: "T"
    checkoutCommit: "<space>"
    resetCherryPick: "<c-R>"
    copyCommitAttributeToClipboard: "y"
    openLogMenu: "<c-l>"
    openInBrowser: "o"
    viewBisectOptions: "b"

  stash:
    popStash: "g"
    renameStash: "r"

  commitFiles:
    checkoutCommitFile: "c"

  main:
    toggleSelectHunk: "a"
    pickBothHunks: "b"
    editSelectHunk: "E"

  submodules:
    init: "i"
    update: "u"
    bulkMenu: "b"

  commitMessage:
    commitMenu: "<c-o>"